<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Cliente</title>
</head>
<body>

    <h1>Informações Pessoais</h1>

    <fieldset>
        <legend>Cadastro do Cliente</legend>

        <form>

            <label>Nome:</label><br>
            <input type="text" placeholder="Digite o nome do cliente"><br><br>

            <label>Idade:</label><br>
            <input type="number" placeholder="Digite a idade"><br><br>

            <label>Endereço:</label><br>
            <input type="text" placeholder="Digite o endereço"><br><br>

            <label>Cidade:</label><br>
            <input type="text" placeholder="Digite a cidade"><br><br>

            <label>Estado:</label><br>
            <input type="text" placeholder="UF" maxlength="2"><br><br>

            <label>CEP:</label><br>
            <input type="text" placeholder="XXXXX-XXX"><br><br>

            <label>Tel/Res:</label><br>
            <input type="text" placeholder="99 99999-9999"><br><br>

            <label>Tel/Cel:</label><br>
            <input type="text" placeholder="99 99999-9999"><br><br>

            <label>Email:</label><br>
            <input type="email" placeholder="Digite o endereço de email"><br><br>

            <input type="submit" value="Enviar">

        </form>
    </fieldset>

</body>
</html>
